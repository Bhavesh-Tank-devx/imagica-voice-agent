<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaya Clinic — Transcripts</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:         #0A0A0A;
      --ink-2:       #1A1A1A;
      --muted:       #5C6066;
      --muted-2:     #8A8F96;
      --rule:        #E5E5E5;
      --rule-2:      #F0F0F0;
      --paper:       #FFFFFF;
      --paper-2:     #FAFAF8;
      --paper-3:     #F4F4F1;
      --accent:      #1E6FFF;
      --accent-soft: #E8F0FF;
      --warn:        #C0392B;
      --ok:          #0A7C53;
      --f-display:   'Inter Tight', -apple-system, sans-serif;
      --f-serif:     'Source Serif 4', Georgia, serif;
      --f-mono:      'JetBrains Mono', 'SFMono-Regular', monospace;
    }

    body {
      font-family: var(--f-display);
      color: var(--ink);
      background: var(--paper);
      font-feature-settings: "ss01","cv11","tnum";
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Nav */
    nav {
      border-bottom: 1px solid var(--rule);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      flex-shrink: 0;
    }
    .nav-brand {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-decoration: none;
    }
    .nav-brand span {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-left: 12px;
      font-weight: 400;
    }
    .nav-links { display: flex; align-items: center; }
    .nav-link {
      font-size: 13px;
      font-weight: 400;
      color: var(--muted);
      text-decoration: none;
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s;
    }
    .nav-link:hover { color: var(--ink); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

    /* Layout */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Left panel */
    .list-panel {
      width: 320px;
      flex-shrink: 0;
      border-right: 1px solid var(--rule);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper);
    }
    .list-header {
      padding: 16px;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .list-eyebrow {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .search-wrap { position: relative; }
    .search-wrap input {
      font-family: var(--f-display);
      font-size: 13px;
      color: var(--ink);
      background: var(--paper-3);
      border: 1px solid var(--rule);
      padding: 7px 10px 7px 30px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted-2); font-size: 12px; }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-2);
      pointer-events: none;
    }
    .list-items { overflow-y: auto; flex: 1; }

    .call-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--rule-2);
      cursor: pointer;
      transition: background 0.1s;
      border-left: 2px solid transparent;
    }
    .call-item:hover { background: var(--paper-2); }
    .call-item.active { background: var(--accent-soft); border-left-color: var(--accent); }
    .call-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 4px;
    }
    .call-name { font-size: 13px; font-weight: 500; color: var(--ink); }
    .call-date { font-family: var(--f-mono); font-size: 10px; color: var(--muted-2); }
    .call-item-mid {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .call-cart { font-family: var(--f-mono); font-size: 10px; color: var(--muted-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 170px; }
    .call-dur { font-family: var(--f-mono); font-size: 10px; color: var(--muted); }

    .disp-tag {
      display: inline-block;
      font-family: var(--f-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid;
      padding: 1px 6px;
    }
    .disp-converted { color: var(--ok); border-color: var(--ok); background: rgba(10,124,83,0.06); }
    .disp-no-outcome { color: #7c5a0a; border-color: #c09030; background: rgba(192,144,0,0.06); }
    .disp-no-answer { color: var(--muted); border-color: var(--rule); background: var(--paper-3); }
    .disp-other { color: var(--warn); border-color: var(--warn); background: rgba(192,57,43,0.06); }

    .empty-list {
      padding: 48px 16px;
      text-align: center;
      font-family: var(--f-mono);
      font-size: 11px;
      color: var(--muted-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* Right panel */
    .transcript-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--paper-2);
    }
    .transcript-header {
      padding: 20px 32px;
      background: var(--paper);
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
      display: none;
    }
    .transcript-name {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.015em;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .transcript-meta {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .meta-item {
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .meta-sep { color: var(--rule); }

    .transcript-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Placeholder */
    .placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .placeholder-rule {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 8px;
    }
    .placeholder-text {
      font-family: var(--f-mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-2);
    }

    /* Message rows */
    .msg-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 680px;
    }
    .msg-row.agent { align-self: flex-start; }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border: 1px solid var(--rule);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--f-mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--muted);
      flex-shrink: 0;
      background: var(--paper);
    }
    .msg-row.agent .msg-avatar { border-color: var(--ink); color: var(--ink); background: var(--paper); }
    .msg-row.user .msg-avatar { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .msg-content { display: flex; flex-direction: column; gap: 4px; }
    .msg-bubble {
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.55;
      color: var(--ink-2);
      border: 1px solid;
    }
    .msg-row.agent .msg-bubble { background: var(--paper); border-color: var(--rule); }
    .msg-row.user .msg-bubble { background: var(--accent-soft); border-color: #b8ceff; color: var(--ink); }
    .msg-time {
      font-family: var(--f-mono);
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--muted-2);
    }
    .msg-row.user .msg-time { text-align: right; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 1.5px solid var(--rule);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <a href="/kaya" class="nav-brand">
      Kaya Clinic
      <span>Voice Agent</span>
    </a>
    <div class="nav-links">
      <a href="/kaya" class="nav-link">Request Call</a>
      <a href="/kaya/appointments" class="nav-link">Appointments</a>
      <a href="/kaya/transcripts" class="nav-link active">Transcripts</a>
    </div>
  </nav>

  <div class="layout">
    <!-- Left: call list -->
    <div class="list-panel">
      <div class="list-header">
        <div class="list-eyebrow">All Calls</div>
        <div class="search-wrap">
          <svg class="search-icon" width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5l3.5 3.5"/>
          </svg>
          <input type="text" id="search" placeholder="Search name or cart ID..." oninput="filterCalls()" />
        </div>
      </div>
      <div class="list-items" id="list-items">
        <div class="empty-list"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- Right: transcript -->
    <div class="transcript-panel">
      <div class="transcript-header" id="t-header">
        <div class="transcript-name" id="t-name"></div>
        <div class="transcript-meta" id="t-meta"></div>
      </div>
      <div class="transcript-body" id="t-body">
        <div class="placeholder">
          <div class="placeholder-rule"></div>
          <div class="placeholder-text">Select a call to view transcript</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allCalls = [];
    let activeId = null;

    async function loadCalls() {
      try {
        const res = await fetch('/api/kaya/transcripts');
        allCalls = (await res.json()).calls;
        renderList(allCalls);
      } catch(e) {
        document.getElementById('list-items').innerHTML = `<div class="empty-list">Failed to load.</div>`;
      }
    }

    function renderList(calls) {
      const el = document.getElementById('list-items');
      if (!calls.length) { el.innerHTML = `<div class="empty-list">No calls found.</div>`; return; }
      el.innerHTML = calls.map(c => `
        <div class="call-item ${c.id === activeId ? 'active' : ''}" id="item-${c.id}" onclick="selectCall(${c.id})">
          <div class="call-item-top">
            <span class="call-name">${esc(c.customer_name)}</span>
            <span class="call-date">${fmtDateTime(c.called_at)}</span>
          </div>
          <div class="call-item-mid">
            <span class="call-cart">${esc(c.cart_id)}</span>
            <span class="call-dur">${fmtDur(c.duration_seconds)}</span>
          </div>
          <span class="disp-tag ${dispClass(c.disposition)}">${fmtDisp(c.disposition)}</span>
        </div>
      `).join('');
    }

    async function selectCall(id) {
      activeId = id;
      document.querySelectorAll('.call-item').forEach(el => el.classList.remove('active'));
      const item = document.getElementById('item-' + id);
      if (item) item.classList.add('active');

      document.getElementById('t-header').style.display = 'none';
      document.getElementById('t-body').innerHTML = `<div class="placeholder"><div class="spinner"></div></div>`;

      try {
        const res = await fetch(`/api/kaya/transcripts/${id}`);
        const data = await res.json();
        renderTranscript(data);
      } catch(e) {
        document.getElementById('t-body').innerHTML = `<div class="placeholder"><div class="placeholder-text">Failed to load transcript.</div></div>`;
      }
    }

    function renderTranscript(data) {
      const header = document.getElementById('t-header');
      header.style.display = 'block';

      document.getElementById('t-name').textContent = `${data.customer_name}  ·  ${data.cart_id}`;
      document.getElementById('t-meta').innerHTML = [
        `<span class="meta-item">${fmtDateTime(data.called_at)}</span>`,
        `<span class="meta-sep">|</span>`,
        `<span class="meta-item">${fmtDur(data.duration_seconds)}</span>`,
        `<span class="meta-sep">|</span>`,
        `<span class="meta-item">${esc(data.customer_phone)}</span>`,
        `<span class="meta-sep">|</span>`,
        `<span class="disp-tag ${dispClass(data.disposition)}">${fmtDisp(data.disposition)}</span>`,
      ].join('');

      const transcript = data.transcript || [];
      const body = document.getElementById('t-body');

      if (!transcript.length) {
        body.innerHTML = `<div class="placeholder"><div class="placeholder-rule"></div><div class="placeholder-text">No transcript recorded for this call.</div></div>`;
        return;
      }

      body.innerHTML = transcript.map(msg => {
        const isAgent = msg.role === 'agent';
        const time = msg.ts ? new Date(msg.ts).toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' }) : '';
        return `
          <div class="msg-row ${isAgent ? 'agent' : 'user'}">
            <div class="msg-avatar">${isAgent ? 'P' : 'C'}</div>
            <div class="msg-content">
              <div class="msg-bubble">${esc(msg.text)}</div>
              ${time ? `<div class="msg-time">${time}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');
      body.scrollTop = 0;
    }

    function filterCalls() {
      const q = document.getElementById('search').value.toLowerCase();
      renderList(allCalls.filter(c =>
        [c.customer_name, c.cart_id, c.disposition].some(v => (v||'').toLowerCase().includes(q))
      ));
    }

    function dispClass(d) {
      if (d === 'CONVERTED') return 'disp-converted';
      if (d === 'CALL_COMPLETED_NO_OUTCOME') return 'disp-no-outcome';
      if (d === 'NO_ANSWER') return 'disp-no-answer';
      return 'disp-other';
    }
    function fmtDisp(d) {
      const map = { CONVERTED: 'Converted', CALL_COMPLETED_NO_OUTCOME: 'No Outcome', NO_ANSWER: 'No Answer', UNREACHABLE: 'Unreachable' };
      return map[d] || d;
    }
    function fmtDur(s) {
      if (!s || s < 2) return '—';
      const m = Math.floor(s / 60), sec = s % 60;
      return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    }
    function fmtDateTime(dt) {
      if (!dt) return '—';
      return new Date(dt).toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
    }
    function esc(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    loadCalls();
  </script>
</body>
</html>
